<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Generator Using HTML CSS and JS</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <p>Enter your Text or URL</p>
        <input type="text" placeholder="Enter Text or URL" id="qrText">

        <div id="imgBox">
            <img src="" id="qrImage">
        </div>

        <button onclick="generateQR()">Generate QR Code</button>

        <button id="downloadBtn" onclick="downloadQR()" style="display: none;">
            Download QR Code
        </button>
    </div>

    <script>

        let imgBox = document.getElementById("imgBox");
        let qrImage = document.getElementById("qrImage");
        let qrText = document.getElementById("qrText");
        let downloadBtn = document.getElementById("downloadBtn");

        function generateQR() {

            if (qrText.value.length > 0) {

                qrImage.src = "https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=" + encodeURIComponent(qrText.value);

                qrImage.onload = function () {
                    imgBox.classList.add("showImg");
                    downloadBtn.style.display = "block";
                };

            } else {

                qrText.classList.add("error");

                setTimeout(() => {
                    qrText.classList.remove("error");
                }, 1000);

            }

        }

        async function downloadQR() {

            try {

                const response = await fetch(qrImage.src);

                const blob = await response.blob();

                const url = window.URL.createObjectURL(blob);

                const link = document.createElement("a");

                link.href = url;

                let fileName = qrText.value.trim() || "QRCode";

                fileName = fileName.replace(/[<>:"/\\|?*]+/g, "_");

                link.download = fileName + ".png";

                document.body.appendChild(link);

                link.click();

                document.body.removeChild(link);

                window.URL.revokeObjectURL(url);

            } catch (err) {

                alert("Download failed!");

                console.log(err);

            }

        }

    </script>

</body>

</html>
