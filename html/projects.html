<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Navbar - HTML/CSS/JS</title>

    <!-- Import Phosphor Icons (Lightweight modern icons) -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/projects.css">

</head>

<body>

    <!-- Navigation Bar -->
    <nav class="navbar">
        <!-- 1. Left: Logo -->
        <a href="#" class="logo">Santos<span>07.</span></a>

        <!-- 2. Middle: Menu Links -->
        <ul class="nav-links" id="navLinks">
            <li><a href="/index.html#home" class="nav-link">Home</a></li>
            <li><a href="/index.html#about" class="nav-link">About Me</a></li>
            <li><a href="/index.html#projects" class="nav-link">Projects</a></li>
            <li><a href="/index.html#contact" class="nav-link">Contact</a></li>
        </ul>

        <!-- 3. Right: Controls -->
        <div class="nav-controls">
            <!-- Theme Toggle Icon -->
            <button class="theme-btn" id="themeToggle" aria-label="Toggle Dark Mode">
                <i class="ph ph-moon"></i>
            </button>

            <!-- Mobile Hamburger -->
            <div class="hamburger" id="hamburger">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>
        </div>
    </nav>

    <div class="projects-page">
        <a href="/index.html" class="back-btn"><i class="ph-bold ph-arrow-left"></i> Back to Home</a>
        <h1 class="page-title">All Projects</h1>

        <div class="projects-grid" id="all-projects-container">
            <!-- JS will inject all projects here -->
        </div>
    </div>

    <script src="/js/script.js"></script>

</body>

</html>
